name: 🤖 AI LinkedIn Job Hunter

on:
  schedule:
    - cron: '0 */3 * * *'   # Every 3 hours
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  hunt-jobs:
    runs-on: ubuntu-22.04
    timeout-minutes: 50      # Safety cap — must finish before next cron fires

    env:
      # ── LinkedIn ──────────────────────────────────────────────────────────────
      LINKEDIN_EMAIL:          aditya.243242@gmail.com
      LINKEDIN_PASSWORD:       ${{ secrets.LINKEDIN_PASSWORD }}

      # ── Search settings ───────────────────────────────────────────────────────
      SEARCH_KEYWORDS:         "DevOps,SRE,Platform Engineer,Cloud Engineer,Infrastructure Engineer"
      LOCATION:                "India"
      MAX_PAGES:               "5"
      FRESHNESS_MINUTES:       "180"   # Match cron interval (3 hours = 180 min)

      # ── Filters ───────────────────────────────────────────────────────────────
      EXCLUDE_KEYWORDS:        "senior,lead,principal,staff,manager,director,vp,head of"
      MAX_EXPERIENCE_YEARS:    "2"

      # ── Telegram ──────────────────────────────────────────────────────────────
      TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}

      # ── AWS S3 ────────────────────────────────────────────────────────────────
      AWS_ACCESS_KEY_ID:       ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:   ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION:              ap-south-1
      S3_BUCKET:               ${{ secrets.S3_BUCKET_NAME }}   # config.py reads S3_BUCKET
      S3_PREFIX:               "Jobs"

      # ── Run as single cycle (required for GitHub Actions) ─────────────────────
      RUN_ONCE:                "true"

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install Python dependencies ────────────────────────────────────────
      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Install Playwright + Chromium ──────────────────────────────────────
      # ubuntu-22.04 (jammy) has libasound2 natively — --with-deps works fine.
      - name: 🌐 Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      # ── 5. Configure AWS credentials ──────────────────────────────────────────
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      # ── 6. Run the job hunter ─────────────────────────────────────────────────
      - name: 🔍 Run AI Job Hunter
        run: python main.py

      # ── 7. Upload log artifact ────────────────────────────────────────────────
      - name: 📁 Upload job hunter log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-hunter-log-${{ github.run_number }}
          path: job_hunter.log
          retention-days: 7

      # ── 8. Summary ────────────────────────────────────────────────────────────
      - name: 📊 Job Hunt Summary
        if: always()
        run: |
          echo "### 🤖 AI Job Hunt Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting       | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Roles         | DevOps / SRE / Platform |" >> $GITHUB_STEP_SUMMARY
          echo "| Experience    | 0–2 years |" >> $GITHUB_STEP_SUMMARY
          echo "| Window        | Last 3 hours |" >> $GITHUB_STEP_SUMMARY
          echo "| Location      | India / Remote |" >> $GITHUB_STEP_SUMMARY
          echo "| Storage       | S3 (${{ secrets.S3_BUCKET_NAME }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Alerts        | Telegram ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID        | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
